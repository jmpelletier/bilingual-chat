<!-- Inline style to avoid an extra round trip before the page can render. -->
<style type="text/css">
* {
  box-sizing: border-box;
}
body {
  font-family: Arial, Helvetica, sans-serif;
}

#chatlog {
  position: fixed;
  top: 0;
  bottom: 32px;
  left: 0;
  right: 200px;
  overflow-y: auto;
  padding: 8px;
  overflow-wrap: break-word;
}
#chatlog span.username {
  font-weight: bold;
}
#chatlog .translation {
  display: block;
  font-size: 0.85em;
  color: #666;
  margin-top: 2px;
  padding-left: 8px;
  border-left: 2px solid #ddd;
}
#spacer {
  height: calc(100vh - 32px - 5em);
}

#roster {
  font-weight: bold;
  padding: 8px;
}

p {
  margin-top: 0;
  margin-bottom: 8px;
}

  margin: 0;
}

#roster {
  position: fixed;
  right: 0;
  top: 0;
  bottom: 32px;
  width: 200px;
  border-left: none;
}

  display: none;
}

  position: fixed;

  height: 32px;

  border: none;
  border-top: none;

  outline: none;
}

  z-index: 1;
  display: block;
  content: ">";

  bottom: 0;
  left: 0;

  line-height: 32px;
  text-align: center;

}

#name-form {
  position: fixed;
  z-index: 3;
  top: 0;
  bottom: 0;
  left: 0;
  right: 0;
  background-color: white;
}

#login-prompt {
  position: fixed;
  z-index: 4;
  top: 0;
  bottom: 0;
  left: 0;
  right: 0;

  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 150%;

}

#name-input {
  position: fixed;

  top: calc(50% - 1em);

  position: fixed;

#room-form h2 {

#room-list {

#room-list li {

  #name-input { font-size: 150%; }

  position: fixed;

}

  position: fixed;
  top: 4px;
  right: 204px;
  z-index: 1;
  padding: 4px 12px;
  border: 1px solid #ccc;
  background: #f5f5f5;
  cursor: pointer;
  font-size: 12px;
}

@media(max-width:600px) {
  #rooms-btn { right: 74px; }
  #logout-btn { right: 4px; }

<!-- The actual HTML. There is not much of it. -->

  </head>
  <body>
    <div id="login-prompt" style="display:none">
      <p>Please use your personal login link to access the chat.</p>
    </div>
    <form id="name-form" action="/fake-form-action" style="display:none">
      <input id="name-input" placeholder="your display name">
      <p>Choose a display name for the chat</p>
    </form>
    <div id="room-form" style="display:none">
      <h2>Choose a room</h2>
      <ul id="room-list"><li class="empty">Loading rooms...</li></ul>
      <div id="create-room-section">
        <input id="create-room-input" placeholder="new room name" maxlength="32">
        <button id="create-room-btn">Create</button>
      </div>
    </div>
    <form id="chatroom" action="/fake-form-action">
      <div id="chatlog">
        <div id="spacer"></div>
      </div>
      <div id="roster"></div>
      <button id="rooms-btn" type="button">Rooms</button>
      <button id="logout-btn" type="button">Logout</button>
      <input id="chat-input">
    </form>
  </body>

<!--===================================================================================-->
<!-- Client-side JavaScript code for the app. -->

<script type="text/javascript">
let currentWebSocket = null;

let loginPrompt = document.querySelector("#login-prompt");
let nameForm = document.querySelector("#name-form");
let nameInput = document.querySelector("#name-input");
let roomForm = document.querySelector("#room-form");
let roomList = document.querySelector("#room-list");
let createRoomInput = document.querySelector("#create-room-input");
let createRoomBtn = document.querySelector("#create-room-btn");
let chatroom = document.querySelector("#chatroom");
let chatlog = document.querySelector("#chatlog");
let chatInput = document.querySelector("#chat-input");
let roster = document.querySelector("#roster");
let logoutBtn = document.querySelector("#logout-btn");
let roomsBtn = document.querySelector("#rooms-btn");

// Is the chatlog scrolled to the bottom?
let isAtBottom = true;

let username;  // display name
let userEmail;
let roomname;

let hostname = window.location.host;
if (hostname == "") {
  hostname = "edge-chat-demo.cloudflareworkers.com";
}

// =========================================================
// Auth flow: check session → name → room → chat
// =========================================================

async function checkSession() {
  try {
    let resp = await fetch("/api/auth/session");
    if (resp.ok) {
      let data = await resp.json();
      userEmail = data.email;
      if (data.displayName) {
        username = data.displayName;
        loginPrompt.remove();
        nameForm.remove();
        startRoomChooser();
      } else {
        loginPrompt.remove();
        startNameChooser();
      }
    } else {
      // Not authenticated — show login prompt
      loginPrompt.style.display = "";
    }
  } catch (err) {
    loginPrompt.style.display = "";
  }
}

function startNameChooser() {
  nameForm.style.display = "";

  nameForm.addEventListener("submit", async event => {
    event.preventDefault();
    let name = nameInput.value.trim();
    if (!name || name.length === 0) return;
    if (name.length > 32) {
      nameInput.value = name.slice(0, 32);
      return;
    }

    nameInput.disabled = true;

    try {
      let resp = await fetch("/api/auth/set-name", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ displayName: name }),
      });

      let data = await resp.json();
      if (!resp.ok) {
        alert(data.error || "Failed to set name.");
        nameInput.disabled = false;
        return;
      }

      username = name;
      nameForm.remove();
      startRoomChooser();
    } catch (err) {
      alert("Network error. Please try again.");
      nameInput.disabled = false;
    }
  });

  nameInput.addEventListener("input", event => {
    if (event.currentTarget.value.length > 32) {
      event.currentTarget.value = event.currentTarget.value.slice(0, 32);
    }
  });

  nameInput.focus();
}

function startRoomChooser() {
  roomForm.style.display = "";

  if (document.location.hash.length > 1) {
    roomname = decodeURIComponent(document.location.hash.slice(1));
    startChat();
    return;
  }

  // Fetch and render the room list
  async function loadRooms() {
    try {
      let resp = await fetch("/api/rooms");
      let data = await resp.json();
      roomList.innerHTML = "";
      if (data.rooms.length === 0) {
        let li = document.createElement("li");
        li.className = "empty";
        li.textContent = "No rooms yet. Create one below.";
        roomList.appendChild(li);
      } else {
        for (let name of data.rooms) {
          let li = document.createElement("li");
          li.textContent = name;
          li.addEventListener("click", () => {
            roomname = name;
            startChat();
          });
          roomList.appendChild(li);
        }
      }
    } catch (err) {
      roomList.innerHTML = "<li class='empty'>Failed to load rooms.</li>";
    }
  }

  loadRooms();

  createRoomBtn.addEventListener("click", async () => {
    let name = createRoomInput.value.trim();
    if (!name) return;

    createRoomBtn.disabled = true;
    createRoomInput.disabled = true;

    try {
      let resp = await fetch("/api/rooms", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name }),
      });

      let data = await resp.json();
      if (!resp.ok) {
        alert(data.error || "Failed to create room.");
        createRoomBtn.disabled = false;
        createRoomInput.disabled = false;
        return;
      }

      createRoomInput.value = "";
      createRoomBtn.disabled = false;
      createRoomInput.disabled = false;
      await loadRooms();
    } catch (err) {
      alert("Network error. Please try again.");
      createRoomBtn.disabled = false;
      createRoomInput.disabled = false;
    }
  });

  createRoomInput.addEventListener("keydown", event => {
    if (event.key === "Enter") {
      event.preventDefault();
      createRoomBtn.click();
    }
  });

  createRoomInput.focus();
}

function startChat() {
  roomForm.remove();

  roomname = roomname.trim();

  if (roomname.length === 0 || roomname.length > 32) {
    addChatMessage("ERROR", "Invalid room name.");
    return;
  }

  document.location.hash = "#" + encodeURIComponent(roomname);

  chatInput.addEventListener("keydown", event => {
    if (event.keyCode == 38) {
      chatlog.scrollBy(0, -50);
    } else if (event.keyCode == 40) {
      chatlog.scrollBy(0, 50);
    } else if (event.keyCode == 33) {
      chatlog.scrollBy(0, -chatlog.clientHeight + 50);
    } else if (event.keyCode == 34) {
      chatlog.scrollBy(0, chatlog.clientHeight - 50);
    }
  });

  chatroom.addEventListener("submit", event => {
    event.preventDefault();

    if (currentWebSocket) {
      currentWebSocket.send(JSON.stringify({message: chatInput.value}));
      chatInput.value = "";
      chatlog.scrollBy(0, 1e8);
    }
  });

  chatInput.addEventListener("input", event => {
    if (event.currentTarget.value.length > 256) {
      event.currentTarget.value = event.currentTarget.value.slice(0, 256);
    }
  });

  chatlog.addEventListener("scroll", event => {
    isAtBottom = chatlog.scrollTop + chatlog.clientHeight >= chatlog.scrollHeight;
  });

  chatInput.focus();
  document.body.addEventListener("click", event => {
    if (window.getSelection().toString() == "") {
      chatInput.focus();
    }
  });

  if('visualViewport' in window) {
    window.visualViewport.addEventListener('resize', function(event) {
      if (isAtBottom) {
        chatlog.scrollBy(0, 1e8);
      }
    });
  }

  // Rooms button handler
  roomsBtn.addEventListener("click", () => {
    if (currentWebSocket) {
      currentWebSocket.close();
      currentWebSocket = null;
    }
    document.location.hash = "";
    document.location.reload();
  });

  // Logout handler
  logoutBtn.addEventListener("click", async () => {
    try {
      await fetch("/api/auth/logout", { method: "POST" });
    } catch (err) {
      // Ignore errors, clear local state anyway.
    }
    if (currentWebSocket) {
      currentWebSocket.close();
      currentWebSocket = null;
    }
    document.location.hash = "";
    document.location.reload();
  });

  join();
}

let lastSeenTimestamp = 0;
let wroteWelcomeMessages = false;
let messageElements = new Map();

function join() {
  const wss = document.location.protocol === "http:" ? "ws://" : "wss://";
  let ws = new WebSocket(wss + hostname + "/api/room/" + encodeURIComponent(roomname) + "/websocket");
  let rejoined = false;
  let startTime = Date.now();

  let rejoin = async () => {
    if (!rejoined) {
      rejoined = true;
      currentWebSocket = null;

      while (roster.firstChild) {
        roster.removeChild(roster.firstChild);
      }

      let timeSinceLastJoin = Date.now() - startTime;
      if (timeSinceLastJoin < 10000) {
        await new Promise(resolve => setTimeout(resolve, 10000 - timeSinceLastJoin));
      }

      join();
    }
  }

  ws.addEventListener("open", event => {
    currentWebSocket = ws;
    // No need to send a name message; the server already knows who we are
    // from the session cookie.
  });

  ws.addEventListener("message", event => {
    let data = JSON.parse(event.data);

    if (data.error) {
      addChatMessage(null, "* Error: " + data.error);
    } else if (data.joined) {
      let p = document.createElement("p");
      p.innerText = data.joined;
      roster.appendChild(p);
    } else if (data.quit) {
      for (let child of roster.childNodes) {
        if (child.innerText == data.quit) {
          roster.removeChild(child);
          break;
        }
      }
    } else if (data.ready) {
      if (!wroteWelcomeMessages) {
        wroteWelcomeMessages = true;
        addChatMessage(null,
            "* This is a demo app built with Cloudflare Workers Durable Objects.");
        addChatMessage(null,
            "* You are authenticated as " + username + ". Chat history is saved.");
        addChatMessage(null,
            "* Welcome to " + roomname + ". Say hi!");
      }
    } else if (data.type === "translation") {
      let el = messageElements.get(data.timestamp);
      if (el) {
        let span = el.querySelector(".translation");
        if (!span) {
          span = document.createElement("span");
          span.className = "translation";
          el.appendChild(span);
        }
        span.textContent = data.text;
        if (isAtBottom) chatlog.scrollBy(0, 1e8);
      }
    } else {
      if (data.timestamp > lastSeenTimestamp) {
        addChatMessage(data.name, data.message, data.timestamp, data.translation);
        lastSeenTimestamp = data.timestamp;
      }
    }
  });

  ws.addEventListener("close", event => {
    console.log("WebSocket closed, reconnecting:", event.code, event.reason);
    rejoin();
  });
  ws.addEventListener("error", event => {
    console.log("WebSocket error, reconnecting:", event);
    rejoin();
  });
}

function addChatMessage(name, text, timestamp, translation) {
  let p = document.createElement("p");
  if (name) {
    let tag = document.createElement("span");
    tag.className = "username";
    tag.innerText = name + ": ";
    p.appendChild(tag);
  }
  p.appendChild(document.createTextNode(text));

  if (translation) {
    let span = document.createElement("span");
    span.className = "translation";
    span.textContent = translation.text;
    p.appendChild(span);
  }

  if (timestamp) {
    messageElements.set(timestamp, p);
  }

  chatlog.appendChild(p);
  if (isAtBottom) {
    chatlog.scrollBy(0, 1e8);
  }
}

// Start the auth flow on page load
checkSession();
</script>

</html>
