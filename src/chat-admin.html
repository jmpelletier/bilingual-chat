<!DOCTYPE html>
<!--
  THIS IS NOT THE INTERESTING FILE

  This is just some UI code. There's nothing interesting and unique in this file. The interesting
  thing about this demo is the server side, which is in chat.mjs.

  WARNING: This was written by a systems engineer, not a web developer. It's probably bad.
-->

<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<!--===================================================================================-->
<!-- Shared stylesheet -->
<link rel="stylesheet" href="/chat.css">
<!-- Page-specific styles -->
<style type="text/css">
</style>

<!--===================================================================================-->
<!-- The actual HTML. There is not much of it. -->

  </head>
  <body>
    <div id="login-prompt" style="display:none">
      <p>Please use your personal login link to access the chat.</p>
    </div>
    <form id="name-form" action="/fake-form-action" style="display:none">
      <input id="name-input" placeholder="your display name">
      <p>Choose a display name for the chat. This doesn't have to be your real name. You can remain anonmymous.</p>
      <p>表示名を指定してください。本名じゃなくても大丈夫です。匿名でも参加できます。</p>
    </form>
    <div id="room-form" style="display:none">
      <h2>Choose a room</h2>
      <ul id="room-list"><li class="empty">Loading rooms...</li></ul>
      <div id="create-room-section">
        <input id="create-room-input" placeholder="new room name" maxlength="64">
        <button id="create-room-btn">Create</button>
      </div>
    </div>
    <header id="app-header">
      <div id="header-info">
        <span id="header-title"></span>
        <span id="header-user"></span>
      </div>
      <button id="rooms-btn" class="toolbar-btn" type="button">Rooms</button>
      <button id="export-btn" class="toolbar-btn" type="button">Export</button>
      <button id="logout-btn" class="toolbar-btn" type="button">Logout</button>
    </header>
    <form id="chatroom" action="/fake-form-action">
      <div id="chatlog">
        <div id="spacer"></div>
      </div>
      <div id="input-bar">
        <textarea id="chat-input" placeholder="Type a message..." rows="1"></textarea>
        <button id="send-btn" type="button">Send</button>
      </div>
    </form>
  </body>

<!--===================================================================================-->
<!-- Client-side JavaScript code for the app. -->

<script type="text/javascript">
let currentWebSocket = null;

let loginPrompt = document.querySelector("#login-prompt");
let nameForm = document.querySelector("#name-form");
let nameInput = document.querySelector("#name-input");
let roomForm = document.querySelector("#room-form");
let roomList = document.querySelector("#room-list");
let createRoomSection = document.querySelector("#create-room-section");
let createRoomInput = document.querySelector("#create-room-input");
let createRoomBtn = document.querySelector("#create-room-btn");
let chatroom = document.querySelector("#chatroom");
let chatlog = document.querySelector("#chatlog");
let chatInput = document.querySelector("#chat-input");
let logoutBtn = document.querySelector("#logout-btn");
let roomsBtn = document.querySelector("#rooms-btn");
let exportBtn = document.querySelector("#export-btn");

// Is the chatlog scrolled to the bottom?
let isAtBottom = true;

let username;  // display name
let userEmail;
let roomname;
let isAdminUser = false;

let hostname = window.location.host;
if (hostname == "") {
  hostname = "edge-chat-demo.cloudflareworkers.com";
}

// =========================================================
// Auth flow: check session 竊・name 竊・room 竊・chat
// =========================================================

async function checkSession() {
  try {
    let resp = await fetch("/api/auth/session");
    if (resp.ok) {
      let data = await resp.json();
      userEmail = data.email;
      isAdminUser = !!data.admin;
      if (data.displayName) {
        username = data.displayName;
        loginPrompt.remove();
        nameForm.remove();
        startRoomChooser();
      } else {
        loginPrompt.remove();
        startNameChooser();
      }
    } else {
      // Not authenticated 窶・show login prompt
      loginPrompt.style.display = "";
    }
  } catch (err) {
    loginPrompt.style.display = "";
  }
}

function startNameChooser() {
  nameForm.style.display = "";

  nameForm.addEventListener("submit", async event => {
    event.preventDefault();
    let name = nameInput.value.trim();
    if (!name || name.length === 0) return;
    if (name.length > 32) {
      nameInput.value = name.slice(0, 32);
      return;
    }

    nameInput.disabled = true;

    try {
      let resp = await fetch("/api/auth/set-name", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ displayName: name }),
      });

      let data = await resp.json();
      if (!resp.ok) {
        alert(data.error || "Failed to set name.");
        nameInput.disabled = false;
        return;
      }

      username = name;
      nameForm.remove();
      startRoomChooser();
    } catch (err) {
      alert("Network error. Please try again.");
      nameInput.disabled = false;
    }
  });

  nameInput.addEventListener("input", event => {
    if (event.currentTarget.value.length > 32) {
      event.currentTarget.value = event.currentTarget.value.slice(0, 32);
    }
  });

  nameInput.focus();
}

function startRoomChooser() {
  roomForm.style.display = "";
  roomsBtn.style.display = "none";
  exportBtn.style.display = "";
  createRoomSection.style.display = isAdminUser ? "" : "none";

  if (document.location.hash.length > 1) {
    roomname = decodeURIComponent(document.location.hash.slice(1));
    startChat();
    return;
  }

  // Fetch and render the room list
  async function loadRooms() {
    try {
      let resp = await fetch("/api/rooms");
      let data = await resp.json();
      let regularRooms = data.rooms || [];
      let archivedRooms = data.archivedRooms || [];
      roomList.innerHTML = "";

      async function setArchiveState(name, archived) {
        let resp = await fetch("/api/rooms/archive", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, archived }),
        });
        let result = await resp.json();
        if (!resp.ok) {
          throw new Error(result.error || "Failed to update room state.");
        }
      }

      function appendRoomItem(name, archived) {
        let li = document.createElement("li");
        li.className = "room-item";

        let nameSpan = document.createElement("span");
        nameSpan.className = "room-name";
        nameSpan.textContent = name;
        li.appendChild(nameSpan);

        let actions = document.createElement("div");
        actions.className = "room-actions";

        let archiveBtn = document.createElement("button");
        archiveBtn.type = "button";
        archiveBtn.className = "archive-btn";
        archiveBtn.textContent = archived ? "Unarchive" : "Archive";
        archiveBtn.addEventListener("click", async (event) => {
          event.stopPropagation();
          archiveBtn.disabled = true;
          try {
            await setArchiveState(name, !archived);
            await loadRooms();
          } catch (err) {
            alert(err.message || "Failed to update room state.");
            archiveBtn.disabled = false;
          }
        });
        actions.appendChild(archiveBtn);
        li.appendChild(actions);

        li.addEventListener("click", () => {
          roomname = name;
          startChat();
        });

        roomList.appendChild(li);
      }

      if (regularRooms.length === 0 && archivedRooms.length === 0) {
        let li = document.createElement("li");
        li.className = "empty";
        li.textContent = "No rooms yet. Create one below.";
        roomList.appendChild(li);
      } else {
        let regularTitle = document.createElement("li");
        regularTitle.className = "room-section-title";
        regularTitle.textContent = "Rooms";
        roomList.appendChild(regularTitle);

        for (let name of regularRooms) {
          appendRoomItem(name, false);
        }

        let archivedTitle = document.createElement("li");
        archivedTitle.className = "room-section-title";
        archivedTitle.textContent = "Archived Rooms";
        roomList.appendChild(archivedTitle);

        if (archivedRooms.length === 0) {
          let li = document.createElement("li");
          li.className = "empty";
          li.textContent = "No archived rooms.";
          roomList.appendChild(li);
        } else {
          for (let name of archivedRooms) {
            appendRoomItem(name, true);
          }
        }
      }
    } catch (err) {
      roomList.innerHTML = "<li class='empty'>Failed to load rooms.</li>";
    }
  }

  loadRooms();

  createRoomBtn.addEventListener("click", async () => {
    let name = createRoomInput.value.trim();
    if (!name) return;

    createRoomBtn.disabled = true;
    createRoomInput.disabled = true;

    try {
      let resp = await fetch("/api/rooms", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name }),
      });

      let data = await resp.json();
      if (!resp.ok) {
        alert(data.error || "Failed to create room.");
        createRoomBtn.disabled = false;
        createRoomInput.disabled = false;
        return;
      }

      createRoomInput.value = "";
      createRoomBtn.disabled = false;
      createRoomInput.disabled = false;
      await loadRooms();
    } catch (err) {
      alert("Network error. Please try again.");
      createRoomBtn.disabled = false;
      createRoomInput.disabled = false;
    }
  });

  createRoomInput.addEventListener("keydown", event => {
    if (event.key === "Enter") {
      event.preventDefault();
      createRoomBtn.click();
    }
  });

  if (isAdminUser) {
    createRoomInput.focus();
  }
}

function startChat() {
  roomForm.remove();
  roomsBtn.style.display = "";
  exportBtn.style.display = "";

  roomname = roomname.trim();

  if (roomname.length === 0 || roomname.length > 64) {
    addChatMessage("ERROR", "Invalid room name.");
    return;
  }

  document.location.hash = "#" + encodeURIComponent(roomname);
  document.querySelector("#header-title").textContent = roomname;
  document.querySelector("#header-user").textContent = username;

  function sendMessage() {
    let msg = chatInput.value.trim();
    if (!msg || !currentWebSocket) return;
    currentWebSocket.send(JSON.stringify({message: msg}));
    chatInput.value = "";
    chatInput.style.height = "auto";
    chatlog.scrollBy(0, 1e8);
  }

  document.querySelector("#send-btn").addEventListener("click", sendMessage);

  chatInput.addEventListener("input", event => {
    if (event.currentTarget.value.length > 256) {
      event.currentTarget.value = event.currentTarget.value.slice(0, 256);
    }
    // Auto-resize textarea
    chatInput.style.height = "auto";
    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + "px";
  });

  chatlog.addEventListener("scroll", event => {
    isAtBottom = chatlog.scrollTop + chatlog.clientHeight >= chatlog.scrollHeight;
  });

  if('visualViewport' in window) {
    window.visualViewport.addEventListener('resize', function(event) {
      if (isAtBottom) {
        chatlog.scrollBy(0, 1e8);
      }
    });
  }

  // Rooms button handler
  roomsBtn.addEventListener("click", () => {
    if (currentWebSocket) {
      currentWebSocket.close();
      currentWebSocket = null;
    }
    document.location.hash = "";
    document.location.reload();
  });

  // Export button handler
  exportBtn.addEventListener("click", async () => {
    try {
      let resp = await fetch("/api/room/" + encodeURIComponent(roomname) + "/export");
      if (!resp.ok) {
        alert("Export failed: " + resp.statusText);
        return;
      }
      let blob = await resp.blob();
      let url = URL.createObjectURL(blob);
      let a = document.createElement("a");
      a.href = url;
      a.download = roomname + "-export.xlsx";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (err) {
      alert("Export failed: " + err.message);
    }
  });

  // Logout handler
  logoutBtn.addEventListener("click", async () => {
    try {
      await fetch("/api/auth/logout", { method: "POST" });
    } catch (err) {
      // Ignore errors, clear local state anyway.
    }
    if (currentWebSocket) {
      currentWebSocket.close();
      currentWebSocket = null;
    }
    document.location.hash = "";
    document.location.reload();
  });

  join();
}

let lastSeenTimestamp = 0;
let wroteWelcomeMessages = false;
let messageElements = new Map();

function join() {
  const wss = document.location.protocol === "http:" ? "ws://" : "wss://";
  let ws = new WebSocket(wss + hostname + "/api/room/" + encodeURIComponent(roomname) + "/websocket");
  let rejoined = false;
  let startTime = Date.now();

  let rejoin = async () => {
    if (!rejoined) {
      rejoined = true;
      currentWebSocket = null;

      let timeSinceLastJoin = Date.now() - startTime;
      if (timeSinceLastJoin < 10000) {
        await new Promise(resolve => setTimeout(resolve, 10000 - timeSinceLastJoin));
      }

      join();
    }
  }

  ws.addEventListener("open", event => {
    currentWebSocket = ws;
    // No need to send a name message; the server already knows who we are
    // from the session cookie.
  });

  ws.addEventListener("message", event => {
    let data = JSON.parse(event.data);

    if (data.error) {
      addChatMessage(null, "* Error: " + data.error);
    } else if (data.ready) {
      // Write a welcome message
      if (!wroteWelcomeMessages) {
        wroteWelcomeMessages = true;

        addChatMessage(null,
            "Welcome to the discussion. You can post in English or Japanese. All messages are automatically translated!");

        addChatMessage(null,
          "ディスカッションへようこそ。英語でも日本語でも投稿できます。すべてのメッセージが自動的に翻訳されます！");
      }
    } else if (data.type === "translation") {
      let el = messageElements.get(data.timestamp);
      if (el) {
        let enEl = el.querySelector(".msg-english");
        let jaEl = el.querySelector(".msg-japanese");
        if (data.lang === "JA") {
          if (!jaEl) {
            let footer = el.querySelector(".msg-footer");
            jaEl = document.createElement("div"); jaEl.className = "msg-japanese"; el.insertBefore(jaEl, footer);
          }
          jaEl.textContent = data.text;
        } else if (data.lang === "EN") {
          let originalText = enEl.textContent;
          enEl.textContent = data.text;
          if (!jaEl) {
            let footer = el.querySelector(".msg-footer");
            jaEl = document.createElement("div"); jaEl.className = "msg-japanese"; el.insertBefore(jaEl, footer);
          }
          jaEl.textContent = originalText;
        }
        if (isAtBottom) chatlog.scrollBy(0, 1e8);
      }
    } else if (data.type === "like") {
      let el = messageElements.get(data.timestamp);
      if (el) {
        let btn = el.querySelector(".like-btn");
        if (btn) {
          let liked = data.likedBy && data.likedBy.includes(userEmail);
          btn.textContent = (liked ? "\u2665" : "\u2661") + (data.count ? " " + data.count : "");
          btn.classList.toggle("liked", liked);
        }
      }
    } else {
      if (data.timestamp > lastSeenTimestamp) {
        addChatMessage(data.name, data.message, data.timestamp, data.translation, data.admin, data.likes);
        lastSeenTimestamp = data.timestamp;
      }
    }
  });

  ws.addEventListener("close", event => {
    console.log("WebSocket closed, reconnecting:", event.code, event.reason);
    rejoin();
  });
  ws.addEventListener("error", event => {
    console.log("WebSocket error, reconnecting:", event);
    rejoin();
  });
}

function addChatMessage(name, text, timestamp, translation, admin, likes) {
  if (!name) {
    let div = document.createElement("div");
    div.className = "system-msg";
    div.textContent = text;
    chatlog.appendChild(div);
    if (isAtBottom) chatlog.scrollBy(0, 1e8);
    return;
  }

  let isSelf = (name === username);
  let div = document.createElement("div");
  div.className = "message " + (isSelf ? "self" : "other") + (admin ? " admin" : "");

  let senderDiv = document.createElement("div");
  senderDiv.className = "msg-sender";
  senderDiv.textContent = name;
  div.appendChild(senderDiv);

  let english = text;
  let japanese = "";
  if (translation) {
    if (translation.lang === "JA") {
      english = text;
      japanese = translation.text;
    } else if (translation.lang === "EN") {
      english = translation.text;
      japanese = text;
    }
  }

  let enDiv = document.createElement("div");
  enDiv.className = "msg-english";
  enDiv.textContent = english;
  div.appendChild(enDiv);

  if (japanese) {
    let jaDiv = document.createElement("div");
    jaDiv.className = "msg-japanese";
    jaDiv.textContent = japanese;
    div.appendChild(jaDiv);
  }

  // Footer with likes
  let footer = document.createElement("div");
  footer.className = "msg-footer";
  if (timestamp) {
    let likesDiv = document.createElement("div");
    likesDiv.className = "msg-likes";
    let btn = document.createElement("button");
    btn.className = "like-btn";
    btn.type = "button";
    let liked = likes && likes.includes(userEmail);
    let count = likes ? likes.length : 0;
    btn.textContent = (liked ? "\u2665" : "\u2661") + (count ? " " + count : "");
    if (liked) btn.classList.add("liked");
    btn.addEventListener("click", () => {
      if (currentWebSocket && currentWebSocket.readyState === WebSocket.OPEN) {
        currentWebSocket.send(JSON.stringify({type: "like", timestamp: timestamp}));
      }
    });
    likesDiv.appendChild(btn);
    footer.appendChild(likesDiv);
    messageElements.set(timestamp, div);
  }
  div.appendChild(footer);

  if (isAdminUser) {
    div.addEventListener("click", (event) => {
      // Don't steal clicks from interactive elements inside the bubble.
      if (event.target.closest("button")) return;
      let isAlreadyHighlighted = div.classList.contains("highlighted");
      // Clear any existing highlight.
      let prev = chatlog.querySelector(".message.highlighted");
      if (prev) prev.classList.remove("highlighted");
      if (!isAlreadyHighlighted) {
        div.classList.add("highlighted");
        chatlog.classList.add("has-highlight");
      } else {
        chatlog.classList.remove("has-highlight");
      }
      event.stopPropagation();
    });
  }

  chatlog.appendChild(div);
  if (isAtBottom) {
    chatlog.scrollBy(0, 1e8);
  }
}

// Clicking outside any message clears the highlight.
document.addEventListener("click", () => {
  let prev = chatlog && chatlog.querySelector(".message.highlighted");
  if (prev) prev.classList.remove("highlighted");
  if (chatlog) chatlog.classList.remove("has-highlight");
});

// Start the auth flow on page load
checkSession();
</script>
<!--===================================================================================-->
</html>
